hero:
  headline: "The terminal that<br>gets out of your way."
  subheadline: >
    Manage complex local stacks without the mental overhead.
    Terminal7 is a visual multiplexer that replaces tmux chords
    with intuitive controls, keeping your workflow organized,
    persistent, and secure across every device.
  primaryCta:
    label: "Launch Web App (Free)"
    url: "https://pwa.terminal7.dev"
  secondaryCta:
    label: "Download for iPad / Android"
  appStoreUrl: "https://apps.apple.com/il/app/terminal7/id1532882447"
  playStoreUrl: "https://play.google.com/store/apps/details?id=dev.terminal7"
  PWAUrl: "https://pwa.terminal7.dev"
gestures:
  title: "Tmux power. Zero configuration."
  text: >
    Stop wrestling with complex dotfiles and obscure keybindings just
    to split your screen. Terminal7 lets you slice your pane, drag
    borders and more. Drop into a perfectly tuned multi-pane
    environment with zero setup.
  vimeo: "793301285"

web:
  title: "Code from anywhere. Reconnect instantly."
  text: >
    Leave your heavy local stack running on your desktop and pick it
    right back up on your tablet or laptop. Powered by secure WebRTC,
    Terminal7 maintains persistent, UDP based sessions across
    networks—no VPNs or dropped SSH connections required.
  image:
    src: "/images/web-image.png"
    alt: "A layer cake of the protocols Terminal7 uses"


copymode:
  title: "Mark & yank with surgical precision."
  text: >
    Selecting text by touch or trackpad is sloppy — words land
    mid-sentence, line endings get lost. Copy Mode drops the active
    pane into a vim-style visual selection: move with hjkl, toggle a
    mark with space, hit enter to yank straight into the clipboard.
    Search the scrollback with <code>/</code> and <code>?</code>
    without lifting your hands off the keyboard.
  image:
    src: "/images/copy-mode.png"
    alt: "Terminal7 pane in copy mode: a yellow-highlighted selection on a filename, with the scrollback search bar showing a 'yaml' query"

home:
  title: "Connect your way. We'll meet you there."
  text: >
    Already running a VPN or have static-IP servers? Terminal7
    connects directly — no extra service required. For everything
    else — laptops on coffee-shop Wi-Fi, home desktops behind a NAT,
    machines with addresses that change — there's PeerBook: a
    managed signalling and relay service with a 2FA-protected
    address book, so you reach your fleet by name instead of by IP.
  image:
    src: "/images/home-image.png"
    alt: "A network diagram showing a Terminl7 user connecting to different hosts"
  buttonUrl: "https://testflight.apple.com/join/rtqhChw5"
